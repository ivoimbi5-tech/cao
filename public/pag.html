<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Carregamento de Saldo...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding-top: 100px;
            background: #ffffff;
            color: #333;
        }
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #00ba71;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success-icon {
            color: #00ba71;
            font-size: 50px;
            display: none;
        }
    </style>
</head>
<body>

<div id="loading-icon" class="loader"></div>
<div id="success-icon" class="success-icon">✔</div>
<h2 id="status">Sincronizando saldo com sua conta...</h2>
<p id="sub-status">Aguarde um instante.</p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getFirestore, doc, setDoc, increment } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAtIJXXRGTjKuP2vLxAIpB3V6GodSqa8vw",
    authDomain: "gen-lang-client-0485599362.firebaseapp.com",
    projectId: "gen-lang-client-0485599362",
    storageBucket: "gen-lang-client-0485599362.firebasestorage.app",
    messagingSenderId: "633640649116",
    appId: "1:633640649116:web:85da303ce91ccb853f4859"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function processarERedirecionar() {
    const statusEl = document.getElementById('status');
    const subStatusEl = document.getElementById('sub-status');

    try {
        statusEl.innerText = "A iniciar...";

        const uid = localStorage.getItem('user');
        const amount = localStorage.getItem('recharge_amount');
        const txId = localStorage.getItem('txId');

        const valor = Number(amount);

        if (!uid || isNaN(valor)) {
            statusEl.innerText = "Dados inválidos";
            setTimeout(() => {
                window.location.href = "https://seguidoresexpress.vercel.app";
            }, 1000);
            return;
        }

        statusEl.innerText = "Conectando ao Firebase...";

        const userRef = doc(db, "users", uid);

        // 🔥 PROMISE COM TIMEOUT (ANTI FREEZE)
        const timeout = new Promise((_, reject) =>
            setTimeout(() => reject(new Error("Timeout Firebase")), 5000)
        );

        const salvar = setDoc(userRef, {
            balance: increment(valor),
            ultimaTransacao: txId || "manual_sync",
            dataSincronizacao: new Date().toISOString()
        }, { merge: true });

        await Promise.race([salvar, timeout]);

        statusEl.innerText = "Saldo atualizado!";
        subStatusEl.innerText = "Redirecionando...";

        localStorage.clear();

        setTimeout(() => {
            window.location.href = "https://seguidoresexpress.vercel.app/dashboard";
        }, 1200);

    } catch (error) {
        console.error("ERRO REAL:", error);

        statusEl.innerText = "Falha: " + error.message;
        subStatusEl.innerText = "Redirecionando mesmo assim...";

        setTimeout(() => {
            window.location.href = "https://seguidoresexpress.vercel.app/dashboard";
        }, 2000);
    }
}

// 🔥 GARANTE EXECUÇÃO
window.addEventListener("load", () => {
    processarERedirecionar();
});
</script>
    
</body>
</html>
