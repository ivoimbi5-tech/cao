<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Processando Pagamento</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f9f9f9; color: #333; }
        .loader { border: 6px solid #f3f3f3; border-top: 6px solid #27ae60; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-msg { color: #e74c3c; font-weight: bold; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <div id="loading-icon" class="loader"></div>
    <h2 id="status">Sincronizando seu saldo...</h2>
    <div id="error-display" class="error-msg"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtIJXXRGTjKuP2vLxAIpB3V6GodSqa8vw",
            authDomain: "gen-lang-client-0485599362.firebaseapp.com",
            projectId: "gen-lang-client-0485599362",
            storageBucket: "gen-lang-client-0485599362.firebasestorage.app",
            messagingSenderId: "633640649116",
            appId: "1:633640649116:web:85da303ce91ccb853f4859"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function processarTransacao() {
            const statusEl = document.getElementById('status');
            const errorEl = document.getElementById('error-display');

            try {
                // 1. Captura os dados exatamente como estão no seu LocalStorage
                const uid = localStorage.getItem('user');
                const amount = localStorage.getItem('recharge_amount');
                const txIdLocal = localStorage.getItem('txId');

                // Pega o txId da URL caso o do Storage falhe
                const urlParams = new URLSearchParams(window.location.search);
                const txIdFinal = urlParams.get('txId') || txIdLocal;

                // Validação simples
                if (!uid || !amount) {
                    throw new Error("Dados de recarga não encontrados no navegador.");
                }

                // 2. Referência da sua coleção específica
                const userRef = doc(db, "ai-studio-efc4f2a7-f3c6-4437-8571-4fd30f54f677", uid);

                // 3. Atualiza o Firebase
                await updateDoc(userRef, {
                    saldo: increment(parseFloat(amount)),
                    ultimaTransacao: txIdFinal,
                    dataProcessamento: new Date().toISOString(),
                    email_pagamento: localStorage.getItem('email')
                });

                statusEl.innerText = "Saldo creditado com sucesso!";
                
                // 4. Limpa o storage para evitar duplicidade
                localStorage.clear(); 

                // 5. Redireciona
                setTimeout(() => {
                    window.location.href = "https://seguidoresexpress.vercel.app/dashbord";
                }, 2000);

            } catch (error) {
                console.error("Erro:", error);
                document.getElementById('loading-icon').style.display = 'none';
                statusEl.innerText = "Erro no processamento";
                errorEl.innerText = error.message;
                errorEl.style.display = 'block';
            }
        }

        processarTransacao();
    </script>
</body>
</html>
