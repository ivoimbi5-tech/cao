<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Processando Pagamento</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0f172a, #000);
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 30px;
      border-radius: 30px;
      background: rgba(17, 17, 17, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .loader {
      border: 5px solid rgba(255,255,255,0.1);
      border-top: 5px solid #10b981;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      margin: 20px auto;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .info {
      margin-top: 20px;
      text-align: left;
      font-size: 14px;
      color: #ccc;
    }

    .box {
      margin-top: 10px;
      background: rgba(255,255,255,0.03);
      padding: 10px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
      color: #fff;
      font-weight: bold;
    }

    .status {
      margin-top: 15px;
      color: #10b981;
      font-weight: bold;
      font-size: 14px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin-top: 20px;
      border-radius: 15px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      text-align: center;
    }

    .btn-pay {
      background: #10b981;
      color: #000;
    }

    .btn-pay:hover {
      background: #059669;
    }

    .btn-confirm {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.1);
      display: none;
    }

    .btn-confirm:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>

<body>

<div class="card">
  <h2 id="title">Pagamento via ClickPayon</h2>

  <div class="loader" id="loader"></div>

  <div class="status" id="status">Aguarde, preparando seu link...</div>

  <div class="info">
    Email:
    <div class="box" id="email">...</div>
  </div>

  <div class="info">
    Usuário:
    <div class="box" id="user">...</div>
  </div>

  <div class="info">
    Valor:
    <div class="box" id="amount">...</div>
  </div>

  <a href="#" id="pay-link" class="btn btn-pay" style="display: none;" target="_blank">PAGAR AGORA</a>
  <button id="confirm-btn" class="btn btn-confirm">JÁ REALIZEI O PAGAMENTO</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const PAYMENT_LINKS = {
    '300': 'https://pay.clickpayon.com/357aa704-8209-4445-90a9-16185409ea6b',
    '500': 'https://pay.clickpayon.com/edbd1003-32c3-4fc1-8be3-c5fdfecb3864',
    '1000': 'https://pay.clickpayon.com/42f62615-1c35-4958-a491-c71a20235bde'
  };

  async function iniciar() {
    try {
      const configRes = await fetch('/firebase-applet-config.json');
      const firebaseConfig = await configRes.json();

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app, firebaseConfig.firestoreDatabaseId);

      const urlParams = new URLSearchParams(window.location.search);
      const txId = urlParams.get('txId') || 'PAG_' + Date.now();

      const uid = localStorage.getItem('user');
      const amount = localStorage.getItem('recharge_amount');
      const email = localStorage.getItem('email');

      if (!uid || !amount) {
        document.getElementById('status').innerText = "Erro: Dados de sessão não encontrados.";
        return;
      }

      document.getElementById('email').innerText = email || '...';
      document.getElementById('amount').innerText = amount + ' Kz';
      
      const userRef = doc(db, "users", uid);
      const userSnap = await getDoc(userRef);
      
      if (userSnap.exists()) {
        const userData = userSnap.data();
        document.getElementById('user').innerText = userData.displayName || userData.name || uid;
      } else {
        document.getElementById('user').innerText = uid;
      }

      const payLink = PAYMENT_LINKS[amount];
      if (payLink) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('status').innerText = "Clique no botão abaixo para pagar:";
        const linkBtn = document.getElementById('pay-link');
        linkBtn.href = payLink;
        linkBtn.style.display = 'block';
        
        linkBtn.onclick = () => {
          document.getElementById('confirm-btn').style.display = 'block';
          document.getElementById('status').innerText = "Após pagar, clique no botão de confirmação.";
        };

        document.getElementById('confirm-btn').onclick = () => {
          confirmarPagamento(uid, amount, txId);
        };
      } else {
        document.getElementById('status').innerText = "Processando pagamento automático...";
        setTimeout(() => {
          confirmarPagamento(uid, amount, txId);
        }, 2000);
      }

    } catch (err) {
      console.error("Erro ao iniciar:", err);
      document.getElementById('status').innerText = "Erro ao conectar com o sistema.";
    }
  }

  async function confirmarPagamento(uid, amount, txId) {
    try {
      document.getElementById('status').innerText = "Confirmando com o servidor...";
      document.getElementById('confirm-btn').disabled = true;
      document.getElementById('confirm-btn').innerText = "PROCESSANDO...";

      const response = await fetch('/api/payments/simulate-success', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          userId: uid,
          amount: Number(amount),
          transactionId: txId
        }),
      });

      const data = await response.json();

      if (response.ok && data.success) {
        localStorage.removeItem('recharge_amount');
        document.getElementById('status').innerText = "Pagamento confirmado! Saldo adicionado.";
        setTimeout(() => {
          window.location.href = "/dashboard?payment=success";
        }, 2000);
      } else {
        document.getElementById('status').innerText = "Erro: " + (data.error || "Falha ao processar");
        document.getElementById('confirm-btn').disabled = false;
        document.getElementById('confirm-btn').innerText = "TENTAR NOVAMENTE";
      }
    } catch (error) {
      document.getElementById('status').innerText = "Erro de conexão.";
      document.getElementById('confirm-btn').disabled = false;
    }
  }

  iniciar();
</script>

</body>
</html>
