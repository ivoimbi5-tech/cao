
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Processando Pagamento...</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
}

.loader {
    border: 4px solid rgba(255,255,255,0.2);
    border-top: 4px solid #00ff99;
    border-radius: 50%;
    width: 55px;
    height: 55px;
    animation: spin 1s linear infinite;
    margin: 0 auto 20px;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

h2 {
    margin-bottom: 10px;
}

.success {
    color: #00ff99;
    font-size: 18px;
    margin-top: 10px;
}

.hidden {
    display: none;
}

.badge {
    display: inline-block;
    padding: 8px 12px;
    background: #00ff99;
    color: #000;
    border-radius: 12px;
    font-weight: bold;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">
    <div id="loading-icon" class="loader"></div>

    <h2 id="status">Sincronizando saldo...</h2>
    <p id="sub-status">Aguarde um instante</p>

    <div id="success-box" class="hidden">
        <div class="badge" id="name">Usuário</div>
        <h3 class="success">Saldo adicionado com sucesso!</h3>
        <p id="added">+0 KZ</p>
    </div>
</div>

<script>
async function processar() {
    const statusEl = document.getElementById('status');
    const subStatusEl = document.getElementById('sub-status');
    const loader = document.getElementById('loading-icon');

    const successBox = document.getElementById('success-box');
    const nameEl = document.getElementById('name');
    const addedEl = document.getElementById('added');

    const uid = localStorage.getItem('user');
    const amount = localStorage.getItem('recharge_amount');
    const txId = localStorage.getItem('txId');

    if (!uid || !amount) {
        statusEl.innerText = "Sem dados";
        return;
    }

    try {
        statusEl.innerText = "Processando pagamento...";

        const res = await fetch("/api/add-balance", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ uid, amount, txId })
        });

        const text = await res.text();

        let data;
        try {
            data = JSON.parse(text);

            // 🔥 UI BONITA
            loader.classList.add("hidden");
            statusEl.innerText = "Sucesso!";
            subStatusEl.innerText = "";

            successBox.classList.remove("hidden");

            // 🔥 MOSTRAR APENAS O NECESSÁRIO
            nameEl.innerText = data.name || "Usuário";
            addedEl.innerText = `+${amount} KZ`;

            localStorage.removeItem("txId");
            localStorage.removeItem("recharge_amount");

            // 🔥 REDIRECIONAR
            setTimeout(() => {
                window.location.href = "https://seguidoresexpress.vercel.app/dashboard";
            }, 2500);

        } catch (e) {
            statusEl.innerText = "Erro na resposta";
            subStatusEl.innerText = "Resposta inválida do servidor";
        }

    } catch (e) {
        statusEl.innerText = "Erro!";
        subStatusEl.innerText = e.message;
    }
}

processar();
</script>

</body>
</html>
