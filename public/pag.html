<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Processando Pagamento</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f9f9f9; }
        .loader { border: 6px solid #f3f3f3; border-top: 6px solid #27ae60; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h2 id="status">Verificando transação...</h2>

    <script type="module">
        // Importando os módulos necessários do Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // CONFIGURAÇÃO DO FIREBASE (Apenas o necessário para o front-end)
        const firebaseConfig = {
            apiKey: "AIzaSyAtIJXXRGTjKuP2vLxAIpB3V6GodSqa8vw",
            authDomain: "gen-lang-client-0485599362.firebaseapp.com",
            projectId: "gen-lang-client-0485599362",
            storageBucket: "gen-lang-client-0485599362.firebasestorage.app",
            messagingSenderId: "633640649116",
            appId: "1:633640649116:web:85da303ce91ccb853f4859"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function processarTransacao() {
            const statusEl = document.getElementById('status');

            try {
                // 1. Pega os dados da URL (txId)
                const urlParams = new URLSearchParams(window.location.search);
                const txIdUrl = urlParams.get('txId');

                // 2. Busca no LocalStorage (Se estiver como 'Object', mude o nome abaixo)
                const storageRaw = localStorage.getItem('dados_pagamento'); // Use o nome exato da chave!
                
                if (!storageRaw) {
                    throw new Error("Dados não encontrados no navegador.");
                }

                const data = JSON.parse(storageRaw);
                const uid = data.uid || "XzuddOivQeSDdbvYFyISKOlHSyQ2";
                const valor = parseFloat(data.amount) || 0;

                // 3. Atualiza o Firebase
                const userRef = doc(db, "ai-studio-efc4f2a7-f3c6-4437-8571-4fd30f54f677", uid);

                await updateDoc(userRef, {
                    saldo: increment(valor),
                    ultimaTransacao: txIdUrl || data.txId,
                    dataProcessamento: new Date()
                });

                statusEl.innerText = "Saldo adicionado! Redirecionando...";
                
                // Limpa o storage para evitar duplicidade
                localStorage.removeItem('dados_pagamento');

                setTimeout(() => {
                    window.location.href = "https://seguidoresexpress.vercel.app/dashbord";
                }, 2000);

            } catch (error) {
                console.error(error);
                statusEl.innerText = "Erro: " + error.message;
                statusEl.style.color = "red";
            }
        }

        processarTransacao();
    </script>
</body>
</html>
