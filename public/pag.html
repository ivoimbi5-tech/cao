<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processando Saldo...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f9; }
        .loader { border: 8px solid #f3f3f3; border-top: 8px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .container { text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="loader"></div>
    <p id="status">Validando transação e atualizando saldo...</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    // Sua configuração (apenas o necessário para o Front-end)
    const firebaseConfig = {
        apiKey: "AIzaSyAtIJXXRGTjKuP2vLxAIpB3V6GodSqa8vw",
        authDomain: "gen-lang-client-0485599362.firebaseapp.com",
        projectId: "gen-lang-client-0485599362",
        storageBucket: "gen-lang-client-0485599362.firebasestorage.app",
        messagingSenderId: "633640649116",
        appId: "1:633640649116:web:85da303ce91ccb853f4859"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function processarSaldo() {
        const statusEl = document.getElementById('status');

        try {
            // 1. Buscar dados no LocalStorage (chave 'dados_pagamento' por exemplo)
            // Ajuste o nome da chave se for diferente
            const storageData = JSON.parse(localStorage.getItem('dados_pagamento'));

   import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

const auth = getAuth(app);

async function processarSaldo() {
    const statusEl = document.getElementById('status');

    try {
        await signInAnonymously(auth); // 🔥 LOGIN

        const storageData = JSON.parse(localStorage.getItem('dados_pagamento'));

        if (!storageData || !storageData.uid) {
            throw new Error("Dados não encontrados.");
        }

        const { uid, amount, txId } = storageData;

        const userRef = doc(db, "ai-studio-efc4f2a7-f3c6-4437-8571-4fd30f54f677", uid);

        await updateDoc(userRef, {
            saldo: increment(amount),
            lastTransaction: txId
        });

        statusEl.innerText = "Sucesso!";

    } catch (error) {
        console.error(error);
        statusEl.innerText = error.message;
    }
}

    // Executa a função ao carregar a página
    window.onload = processarSaldo;
</script>

</body>
</html>
