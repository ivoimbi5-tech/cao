<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Carregamento de Saldo...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding-top: 100px;
            background: #ffffff;
            color: #333;
        }
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #00ba71;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success-icon {
            color: #00ba71;
            font-size: 50px;
            display: none;
        }
    </style>
</head>
<body>

<div id="loading-icon" class="loader"></div>
<div id="success-icon" class="success-icon">✔</div>
<h2 id="status">Sincronizando saldo com sua conta...</h2>
<p id="sub-status">Aguarde um instante.</p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getFirestore, doc, setDoc, increment } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAtIJXXRGTjKuP2vLxAIpB3V6GodSqa8vw",
    authDomain: "gen-lang-client-0485599362.firebaseapp.com",
    projectId: "gen-lang-client-0485599362",
    storageBucket: "gen-lang-client-0485599362.firebasestorage.app",
    messagingSenderId: "633640649116",
    appId: "1:633640649116:web:85da303ce91ccb853f4859"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function processarERedirecionar() {
    const statusEl = document.getElementById('status');
    const subStatusEl = document.getElementById('sub-status');
    const loader = document.getElementById('loading-icon');
    const successIcon = document.getElementById('success-icon');

    try {
        console.log("INICIANDO...");

        const uid = localStorage.getItem('user');
        const amount = localStorage.getItem('recharge_amount');
        const txId = localStorage.getItem('txId');

        console.log("UID:", uid);
        console.log("AMOUNT:", amount);

        const valor = Number(amount);

        if (!uid || isNaN(valor)) {
            console.warn("Dados inválidos, redirecionando...");
            window.location.href = "https://seguidoresexpress.vercel.app";
            return;
        }

        // 🔥 CORREÇÃO AQUI
        const userRef = doc(db, "users", uid);

        await setDoc(userRef, {
            balance: increment(valor),
            ultimaTransacao: txId || "manual_sync",
            dataSincronizacao: new Date().toISOString()
        }, { merge: true });

        console.log("SALDO ATUALIZADO!");

        // UI sucesso
        loader.style.display = 'none';
        successIcon.style.display = 'block';
        statusEl.innerText = "Saldo Adicionado!";
        subStatusEl.innerText = "Redirecionando...";

        // limpar localStorage
        localStorage.removeItem('user');
        localStorage.removeItem('txId');
        localStorage.removeItem('email');

        // redirecionar
        setTimeout(() => {
            window.location.href = "https://seguidoresexpress.vercel.app/dashbord";
        }, 1200);

    } catch (error) {
        console.error("ERRO:", error);

        statusEl.innerText = "Erro ao sincronizar.";
        subStatusEl.innerText = "Redirecionando...";

        setTimeout(() => {
            window.location.href = "https://seguidoresexpress.vercel.app";
        }, 3000);
    }
}

processarERedirecionar();
</script>

</body>
</html>
