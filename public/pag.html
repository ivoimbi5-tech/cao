<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Carregamento de Saldo...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding-top: 100px;
            background: #ffffff;
            color: #333;
        }
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #00ba71;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success-icon {
            color: #00ba71;
            font-size: 50px;
            display: none;
        }
    </style>
</head>
<body>

<div id="loading-icon" class="loader"></div>
<div id="success-icon" class="success-icon">✔</div>
<h2 id="status">Sincronizando saldo com sua conta...</h2>
<p id="sub-status">Aguarde um instante.</p>

<script>
async function processar() {
    const statusEl = document.getElementById('status');
    const subStatusEl = document.getElementById('sub-status');

    const uid = localStorage.getItem('user');
    const amount = localStorage.getItem('recharge_amount');
    const txId = localStorage.getItem('txId');

    if (!uid || !amount) {
        statusEl.innerText = "Sem dados";
        return;
    }

    try {
        statusEl.innerText = "Enviando para API...";

        const res = await fetch("/api/add-balance", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ uid, amount, txId })
        });

        const text = await res.text();
        console.log("RESPOSTA BRUTA:", text);

        // tenta converter para JSON
        let data;
        try {
            data = JSON.parse(text);
            console.log("JSON:", data);

            statusEl.innerText = "Sucesso!";
            subStatusEl.innerText = JSON.stringify(data, null, 2);

        } catch (e) {
            console.log("Resposta não é JSON");

            statusEl.innerText = "Erro na resposta";
            subStatusEl.innerText = text;
        }

        localStorage.removeItem("txId");

    } catch (e) {
        console.error("ERRO FETCH:", e);
        statusEl.innerText = "Erro!";
        subStatusEl.innerText = e.message;
    }
}

processar();
</script>
    
</body>
</html>
