<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Carregamento de Saldo...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding-top: 100px;
            background: #ffffff;
            color: #333;
        }
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #00ba71;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success-icon {
            color: #00ba71;
            font-size: 50px;
            display: none;
        }
    </style>
</head>
<body>

<div id="loading-icon" class="loader"></div>
<div id="success-icon" class="success-icon">✔</div>
<h2 id="status">Sincronizando saldo com sua conta...</h2>
<p id="sub-status">Aguarde um instante.</p>

<script>
async function processar() {
    const uid = localStorage.getItem('user');
    const amount = localStorage.getItem('recharge_amount');
    const txId = localStorage.getItem('txId');

    if (!uid || !amount) {
        window.location.href = "https://seguidoresexpress.vercel.app/dashboard";
        return;
    }

    try {
       const res = await fetch("/api/add-balance", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        uid,
        amount,
        txId
    })
});

const data = await res.json();
console.log("RESPOSTA API:", data);

        localStorage.clear();

    } catch (e) {
        console.error(e);
    }

    window.location.href = "https://seguidoresexpress.vercel.app/dashboard";
}

processar();
</script>
    
</body>
</html>
